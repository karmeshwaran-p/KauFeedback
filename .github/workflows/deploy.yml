# ──────────────────────────────────────────────────────────────────────────────
# GitHub Actions: Build, Scan & Deploy KauFeedback to AWS EC2
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_DIR: /home/${{ secrets.EC2_USER }}/kau-feedback
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.run_number }}
  FRONTEND_IMAGE: kau-frontend
  BACKEND_IMAGE: kau-backend

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Stage 1: Security & Code Quality Scan
  # ════════════════════════════════════════════════════════════════════════════
  security-scan:
    name: 🛡️ Security & Code Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ════════════════════════════════════════════════════════════════════════════
  # Stage 2: Build Docker Images, Scan with Trivy, Push to Registry
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build, Scan & Push
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest \
            -f frontend/Dockerfile.frontend frontend/

      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest \
            -f backend/Dockerfile.backend backend/

      - name: Run Trivy vulnerability scanner on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Run Trivy vulnerability scanner on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Push Images to Docker Hub
        run: |
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest

  # ════════════════════════════════════════════════════════════════════════════
  # Stage 3: Deploy to EC2
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy deployment config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deployment/"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 1

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e  # Exit immediately if any command fails

            cd ${{ env.DEPLOY_DIR }}

            # Create production .env file
            cat > .env << 'ENVEOF'
            MYSQL_HOST=${{ secrets.MYSQL_HOST }}
            MYSQL_PORT=${{ secrets.MYSQL_PORT }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}

            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}

            API_PORT=${{ secrets.API_PORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}

            VITE_API_URL=${{ secrets.VITE_API_URL }}

            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            ENVEOF
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            # Install Docker Compose plugin if not present
            if ! docker compose version &> /dev/null; then
              echo "Installing Docker Compose plugin..."
              sudo apt-get update && sudo apt-get install -y docker-compose-plugin
            fi

            # Log into Docker Hub to pull images
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Pull and deploy
            echo "Pulling latest images and starting containers..."
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans

            # Clean up old unused images
            sudo docker image prune -af

            # Verify deployment
            sleep 15
            sudo docker compose ps
            curl -sf http://localhost/api/health && echo "✅ Backend is healthy!" || echo "⚠️ Backend check failed"

            echo "🚀 Deployment complete!"
