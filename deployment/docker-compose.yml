services:
  # ─── MySQL Database ───────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: kau-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - app-network

  # ─── Backend (Express API) ───────────────────────────────────────────────────
  backend:
    image: ${DOCKER_USERNAME:-kauvery}/kau-backend:${IMAGE_TAG:-latest}
    container_name: kau-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      API_PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4000:4000"
    networks:
      - app-network

  # ─── Frontend (TanStack Start SSR) ──────────────────────────────────────────
  frontend:
    image: ${DOCKER_USERNAME:-kauvery}/kau-frontend:${IMAGE_TAG:-latest}
    container_name: kau-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - app-network

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: kau-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

  # ═══════════════════════════════════════════════════════════════════════════════
  # MONITORING STACK
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─── Prometheus (metrics collection & storage) ─────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: kau-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - app-network

  # ─── Grafana (visualization & dashboards) ──────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: kau-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://${EC2_HOST:-localhost}:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks:
      - app-network

  # ─── cAdvisor (container metrics: CPU, RAM, network per container) ─────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: kau-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - app-network

  # ─── Node Exporter (host system metrics: CPU, RAM, disk, network) ──────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: kau-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - app-network

  # ─── MySQL Exporter (database metrics) ─────────────────────────────────────
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: kau-mysql-exporter
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - '--mysqld.username=root'
      - '--mysqld.address=mysql:3306'
    ports:
      - "9104:9104"
    networks:
      - app-network

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge
